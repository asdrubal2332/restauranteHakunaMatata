<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#131313",
                        "tertiary-fixed": "#ffdf9e",
                        "error-container": "#93000a",
                        "on-tertiary-container": "#513b00",
                        "on-error-container": "#ffdad6",
                        "primary-fixed": "#ffdcc2",
                        "on-surface": "#e5e2e1",
                        "surface-tint": "#ffb77a",
                        "on-surface-variant": "#ddc1ae",
                        "surface-dim": "#131313",
                        "secondary-fixed-dim": "#78dc77",
                        "on-tertiary-fixed-variant": "#5b4300",
                        "surface-container-low": "#1c1b1b",
                        "surface-container-high": "#2a2a2a",
                        "primary": "#ffb77a",
                        "on-tertiary": "#3f2e00",
                        "tertiary": "#fabd00",
                        "secondary": "#78dc77",
                        "on-primary-fixed": "#2e1500",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#fabd00",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary-fixed": "#94f990",
                        "surface-container": "#201f1f",
                        "outline": "#a48c7a",
                        "inverse-primary": "#8f4e00",
                        "on-tertiary-fixed": "#261a00",
                        "on-secondary-fixed": "#002204",
                        "inverse-on-surface": "#313030",
                        "on-primary": "#4c2700",
                        "on-background": "#e5e2e1",
                        "on-secondary-container": "#95fb92",
                        "on-secondary-fixed-variant": "#005313",
                        "background": "#131313",
                        "primary-container": "#fd8e00",
                        "inverse-surface": "#e5e2e1",
                        "on-primary-container": "#613300",
                        "on-primary-fixed-variant": "#6d3a00",
                        "primary-fixed-dim": "#ffb77a",
                        "surface-variant": "#353534",
                        "error": "#ffb4ab",
                        "on-secondary": "#00390a",
                        "secondary-container": "#00761f",
                        "outline-variant": "#564334",
                        "surface-bright": "#393939",
                        "tertiary-container": "#d7a200",
                        "surface-container-highest": "#353534"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#131313] dark:bg-[#131313] shadow-[0_12px_32px_rgba(0,0,0,0.5)] bg-[#1C1B1B] no-border tonal-layering fixed top-0 left-0 w-full z-50">
<div class="flex justify-between items-center w-full px-10 py-6 max-w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#FFB77A] text-3xl" data-icon="restaurant">restaurant</span>
<h1 class="font-['Plus_Jakarta_Sans'] text-2xl font-bold tracking-tight text-[#E5E2E1] font-black italic">Hakuna Matata</h1>
</div>
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-primary text-lg" data-icon="table_bar">table_bar</span>
<span class="font-headline font-bold text-on-surface">MESA 12</span>
</div>
<button class="hover:bg-[#393939] transition-all duration-200 scale-95 active:opacity-80 transition-transform p-3 rounded-full">
<span class="material-symbols-outlined text-[#FFB77A]" data-icon="search">search</span>
</button>
</div>
</div>
</header>
<main class="flex-1 mt-24 mb-32 px-10 flex gap-10">
<!-- Menu Section -->
<div class="flex-1 flex flex-col gap-8">
<!-- Categories -->
<nav id="hm-categoria-buttons" class="flex gap-4">
<button data-categoria="Bebidas" class="px-8 py-4 bg-gradient-to-tr from-primary to-primary-container text-on-primary-container font-headline font-extrabold rounded-xl shadow-lg transition-transform active:scale-95">
                    Bebidas
                </button>
<button data-categoria="Comidas" class="px-8 py-4 bg-surface-container-high text-on-surface-variant font-headline font-bold rounded-xl hover:bg-surface-bright transition-all">
                    Comidas
                </button>
<button data-categoria="Postres" class="px-8 py-4 bg-surface-container-high text-on-surface-variant font-headline font-bold rounded-xl hover:bg-surface-bright transition-all">
                    Postres
                </button>
</nav>
<!-- Menu Grid -->
<div id="hm-menu-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
<!-- Sidebar / Current Bill -->
<aside class="w-[400px] flex flex-col gap-6 sticky top-24 self-start">
<div class="glass-panel rounded-[1.5rem] flex flex-col h-[calc(100vh-250px)] shadow-2xl overflow-hidden border border-outline-variant/10">
<div class="p-6 bg-surface-container-high/50 flex justify-between items-center border-b border-outline-variant/10">
<h2 class="font-headline font-extrabold text-xl tracking-tight uppercase">Pedido Actual</h2>
<span class="px-3 py-1 bg-secondary-container text-on-secondary-container text-[0.65rem] font-black rounded-full uppercase tracking-widest">Activo</span>
</div>
<div id="hm-pedido-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div><span class="text-sm font-bold w-4 text-center">1</span>
<button class="w-6 h-6 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xs" data-icon="add">add</span>
</button>
</div>
</div>
</div>
</div>
<!-- Bill Totals -->
<div class="p-8 bg-surface-container-highest/30 border-t border-outline-variant/10 space-y-4">
<div class="flex justify-between items-center text-on-surface-variant">
<span class="text-xs font-bold uppercase tracking-widest">Subtotal</span>
<span class="font-headline font-bold" data-total="subtotal">$0</span>
</div>
<div class="flex justify-between items-center text-on-surface-variant">
<span class="text-xs font-bold uppercase tracking-widest">Impuesto (8%)</span>
<span class="font-headline font-bold" data-total="impuesto">$0</span>
</div>
<div class="flex justify-between items-end pt-2 border-t border-outline-variant/10">
<span class="text-xs font-black uppercase tracking-[0.2em] text-primary">Monto Total</span>
<span class="font-headline text-4xl font-extrabold text-on-surface tracking-tighter leading-none" data-total="total">$0</span>
</div>
<button class="w-full py-5 mt-4 bg-gradient-to-tr from-primary to-primary-container text-on-primary-container font-headline font-black text-lg rounded-xl shadow-[0_8px_24px_rgba(253,142,0,0.3)] transition-all active:scale-95 hover:brightness-110">
                        ENVIAR PEDIDO
                    </button>
</div>
</div>
</aside>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#1C1B1B]/90 backdrop-blur-xl rounded-t-[1.5rem] shadow-[0_-8px_24px_rgba(0,0,0,0.4)]">
<!-- Mesas -->
<a class="flex flex-col items-center justify-center text-[#DDC1AE] p-2 opacity-60 hover:bg-[#201F1F] hover:opacity-100 transition-all active:scale-90 duration-150 ease-out" href="gestion_mesas.html">
<span class="material-symbols-outlined text-2xl" data-icon="table_bar">table_bar</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-widest mt-1">Mesas</span>
</a>
<!-- Pedidos -->
<a class="flex flex-col items-center justify-center bg-gradient-to-tr from-[#FFB77A] to-[#FD8E00] text-[#131313] rounded-[1.5rem] px-6 py-2 shadow-[0_0_15px_rgba(253,142,0,0.4)] active:scale-90 transition-all duration-150 ease-out" href="toma_pedidos.html">
<span class="material-symbols-outlined text-2xl" data-icon="receipt_long" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-widest mt-1">Pedidos</span>
</a>
<!-- Menú/POS -->
<a class="flex flex-col items-center justify-center text-[#DDC1AE] p-2 opacity-60 hover:bg-[#201F1F] hover:opacity-100 transition-all active:scale-90 duration-150 ease-out" href="index.html">
<span class="material-symbols-outlined text-2xl" data-icon="point_of_sale">point_of_sale</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-widest mt-1">Menú/POS</span>
</a>
<!-- Pago/Facturación -->
<a class="flex flex-col items-center justify-center text-[#DDC1AE] p-2 opacity-60 hover:bg-[#201F1F] hover:opacity-100 transition-all active:scale-90 duration-150 ease-out" href="facturacion.html">
<span class="material-symbols-outlined text-2xl" data-icon="payments">payments</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-widest mt-1">Facturación</span>
</a>
<!-- Administración -->
<a class="flex flex-col items-center justify-center text-[#DDC1AE] p-2 opacity-60 hover:bg-[#201F1F] hover:opacity-100 transition-all active:scale-90 duration-150 ease-out" href="adm_usuarios.html">
<span class="material-symbols-outlined text-2xl" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-widest mt-1">Administración</span>
</a>
</nav>
<script src="script.js"></script>
<!-- Ghost FAB for Special Requests -->
<div class="fixed bottom-32 right-10 z-40 md:hidden">
<button class="w-14 h-14 rounded-full bg-primary shadow-2xl flex items-center justify-center text-on-primary active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
</button>
</div>
</body></html>
